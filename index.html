<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akuma Paradise — 公會管理系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  :root {
    --orange: #E8500A; --blue: #1478CC; --bg: #F4F5F7; --panel: #FFFFFF;
    --text: #1A1E2A; --font: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); margin: 0; }
  nav { background: var(--panel); padding: 10px 20px; display: flex; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky: top; }
  nav button { background: none; border: none; padding: 10px; cursor: pointer; font-weight: bold; color: var(--text); border-bottom: 3px solid transparent; }
  nav button.active { color: var(--orange); border-bottom: 3px solid var(--orange); }
  .page { display: none; padding: 20px; max-width: 1000px; margin: auto; }
  .page.active { display: block; }
  .card { background: var(--panel); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { padding: 12px; border-bottom: 1px solid #EEE; text-align: left; }
  th { background: var(--blue); color: white; border-radius: 4px; }
  input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #DDD; border-radius: 6px; }
  .btn { background: var(--orange); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  .btn-admin { background: var(--blue); }
  .admin-only { display: none; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 999; }
</style>
</head>
<body>

<nav>
  <button onclick="navTo('home')" id="nav-home">積分總表</button>
  <button onclick="navTo('report')" id="nav-report">任務申報</button>
  <button onclick="navTo('shop')" id="nav-shop">獎勵兌換</button>
  <button onclick="navTo('admin')" id="nav-admin" class="btn-admin" style="color:white; border-radius:5px; margin-left:auto;">管理員登入</button>
</nav>

<div id="page-home" class="page active">
  <div class="card">
    <h2 style="color:var(--blue)">Akuma Paradise 成員貢獻榜</h2>
    <div id="member-table-container">載入中...</div>
  </div>
</div>

<div id="page-report" class="page">
  <div class="card">
    <h2>任務申報 (Graid / Weekly Obj)</h2>
    <p style="font-size: 0.9em; color: #666;">* Graid 每人 +2pt / Weekly 每件 +5pt (月達成額外加成)</p>
    <label>你的玩家名稱:</label>
    <input type="text" id="report-sender" placeholder="例: Akane0125">
    <label>任務類型:</label>
    <select id="report-type" onchange="toggleReportFields()">
      <option value="weekly">Weekly Objective (個人)</option>
      <option value="graid">Graid (四人小隊)</option>
    </select>
    <div id="graid-fields" style="display:none;">
      <label>隊友 2:</label><input type="text" id="p2">
      <label>隊友 3:</label><input type="text" id="p3">
      <label>隊友 4:</label><input type="text" id="p4">
    </div>
    <label>證明截圖連結:</label>
    <input type="url" id="report-link" placeholder="https://imgur.com/...">
    <button class="btn" onclick="submitReport()">提交申請</button>
  </div>
</div>

<div id="page-shop" class="page">
  <div class="card">
    <h2>獎勵清單</h2>
    <div id="reward-list">載入中...</div>
  </div>
</div>

<div id="page-admin" class="page">
  <div class="card">
    <h2>管理員控制台</h2>
    <div id="admin-login-box">
      <input type="password" id="admin-pw" placeholder="輸入管理密碼">
      <button class="btn btn-admin" onclick="adminAuth()">登入</button>
    </div>
    <div id="admin-content" class="admin-only">
      <h3>待審核任務</h3>
      <div id="pending-reports"></div>
      <hr>
      <h3>手動調整 / 增減成員</h3>
      <input type="text" id="new-member-name" placeholder="玩家名稱">
      <button class="btn" onclick="addMember()">新增成員</button>
      <hr>
      <h3>匯入 Guild XP (20M = 1pt)</h3>
      <textarea id="xp-data" placeholder="玩家名稱,增加的XP (例如: Erwin,40000000)"></textarea>
      <button class="btn btn-admin" onclick="importXP()">批次匯入 XP</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD39ppJKPiZktFafaOOXC61Fd-rAM70rAk",
    authDomain: "akuma-paradise-db.firebaseapp.com",
    projectId: "akuma-paradise-db",
    databaseURL: "https://akuma-paradise-db-default-rtdb.asia-southeast1.firebasedatabase.app",
    storageBucket: "akuma-paradise-db.firebasestorage.app",
    messagingSenderId: "616381678361",
    appId: "1:616381678361:web:c27afc23b5cada9756fb88"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // --- 初始化與導航 ---
  window.navTo = function(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('nav-' + id).classList.add('active');
  };

  function toast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  // --- 資料同步 (核心) ---
  onValue(ref(db, 'members'), (snapshot) => {
    const data = snapshot.val() || {};
    renderMemberTable(data);
  });

  function renderMemberTable(data) {
    let html = `<table><tr><th>成員名稱</th><th>總積分</th><th>本月 Weekly</th></tr>`;
    Object.keys(data).forEach(id => {
      const m = data[id];
      html += `<tr><td>${id}</td><td><b>${Math.floor(m.points || 0)}</b></td><td>${m.weeklyCount || 0} 次</td></tr>`;
    });
    html += `</table>`;
    document.getElementById('member-table-container').innerHTML = html;
  }

  // --- 任務申報邏輯 ---
  window.toggleReportFields = () => {
    document.getElementById('graid-fields').style.display = document.getElementById('report-type').value === 'graid' ? 'block' : 'none';
  };

  window.submitReport = async () => {
    const sender = document.getElementById('report-sender').value;
    const type = document.getElementById('report-type').value;
    const link = document.getElementById('report-link').value;
    if(!sender || !link) return toast("請填寫名稱與連結");

    const reportData = {
      sender, type, link, status: 'pending', 
      timestamp: Date.now(),
      players: type === 'graid' ? [sender, document.getElementById('p2').value, document.getElementById('p3').value, document.getElementById('p4').value] : [sender]
    };

    await push(ref(db, 'reports'), reportData);
    toast("申報已提交，請等待管理員審核");
    navTo('home');
  };

  // --- 管理員邏輯 ---
  window.adminAuth = () => {
    const pw = document.getElementById('admin-pw').value;
    if(pw === "akuma888") { // 你可以修改你的管理密碼
      document.getElementById('admin-login-box').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
      loadPendingReports();
    } else {
      toast("密碼錯誤");
    }
  };

  function loadPendingReports() {
    onValue(ref(db, 'reports'), (snapshot) => {
      const reports = snapshot.val() || {};
      let html = "";
      Object.keys(reports).forEach(rid => {
        const r = reports[rid];
        if(r.status === 'pending') {
          html += `<div class="card"><b>${r.type}</b> by ${r.sender} <br> <a href="${r.link}" target="_blank">查看截圖</a><br>
                   <button class="btn" onclick="approveReport('${rid}')">核准</button></div>`;
        }
      });
      document.getElementById('pending-reports').innerHTML = html || "暫無待審核任務";
    });
  }

  window.approveReport = async (rid) => {
    const snap = await get(ref(db, `reports/${rid}`));
    const r = snap.val();
    
    // 計算分數規則
    for (const pName of r.players) {
      if(!pName) continue;
      const mRef = ref(db, `members/${pName}`);
      const mSnap = await get(mRef);
      let mData = mSnap.val() || { points: 0, weeklyCount: 0 };
      
      if(r.type === 'graid') {
        mData.points += 2;
      } else {
        mData.points += 5;
        mData.weeklyCount = (mData.weeklyCount || 0) + 1;
        // Weekly 加成邏輯: 2次+7, 4次+15
        if(mData.weeklyCount === 2) mData.points += 7;
        if(mData.weeklyCount === 4) mData.points += 15;
      }
      await set(mRef, mData);
    }
    await update(ref(db, `reports/${rid}`), { status: 'approved' });
    toast("已核准並自動發放分數");
  };

  window.importXP = async () => {
    const text = document.getElementById('xp-data').value;
    const lines = text.split('\n');
    for(const line of lines) {
      const [name, xp] = line.split(',');
      if(name && xp) {
        const mRef = ref(db, `members/${name.trim()}`);
        const mSnap = await get(mRef);
        let mData = mSnap.val() || { points: 0, weeklyCount: 0 };
        mData.points += (parseFloat(xp) / 20000000);
        await set(mRef, mData);
      }
    }
    toast("XP 匯入完成");
  };

  window.addMember = async () => {
    const name = document.getElementById('new-member-name').value;
    if(name) {
      await set(ref(db, `members/${name}`), { points: 0, weeklyCount: 0 });
      toast("已新增成員: " + name);
    }
  };
</script>
</body>
</html>
