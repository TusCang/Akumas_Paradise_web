<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akuma Paradise — Guild Management</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

  :root {
    --orange: #E8500A;
    --orange-light: #FF6B2B;
    --orange-dark: #C03D00;
    --orange-glow: rgba(232,80,10,0.18);
    --blue: #1478CC;
    --blue-light: #2A90E8;
    --blue-dark: #0D5FA0;
    --blue-glow: rgba(20,120,204,0.15);
    --bg: #F4F5F7;
    --bg2: #FFFFFF;
    --bg3: #ECEEF2;
    --panel: rgba(255,255,255,0.97);
    --border: rgba(232,80,10,0.15);
    --border-blue: rgba(20,120,204,0.18);
    --text: #1A1E2A;
    --text-dim: #4A5268;
    --text-muted: #8A93A8;
    --font: 'Microsoft JhengHei', 'Noto Sans TC', '微軟正黑體', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== BG EFFECTS ===== */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 0%, rgba(232,80,10,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(20,120,204,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(232,80,10,0.12);
    padding: 0 32px;
    display: flex; align-items: center; gap: 24px;
    height: 64px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: white;
    box-shadow: 0 0 16px var(--orange-glow);
    flex-shrink: 0;
  }

  .logo-text { display: flex; flex-direction: column; }
  .logo-title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
  .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  nav { display: flex; gap: 4px; margin-left: auto; }

  nav button {
    background: none; border: none;
    color: var(--text-dim); font-family: var(--font); font-size: 13px;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  nav button:hover { color: var(--text); background: rgba(0,0,0,0.05); }
  nav button.active { color: var(--orange); background: rgba(232,80,10,0.08); }

  #admin-toggle-btn {
    margin-left: 8px;
    padding: 8px 16px;
    border-radius: 8px; border: 1px solid var(--border-blue);
    background: rgba(26,143,227,0.08); color: var(--blue-light);
    font-family: var(--font); font-size: 13px; cursor: pointer;
    transition: all 0.2s;
  }
  #admin-toggle-btn:hover { background: rgba(26,143,227,0.15); }
  #admin-toggle-btn.logged-in { border-color: var(--orange); color: var(--orange); background: rgba(255,107,43,0.08); }

  /* ===== MAIN ===== */
  main { position: relative; z-index: 1; padding: 32px; max-width: 1200px; margin: 0 auto; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

  /* ===== PAGE TITLE ===== */
  .page-header { margin-bottom: 32px; }
  .page-header h1 { font-size: 28px; font-weight: 700; color: var(--text); }
  .page-header h1 span { color: var(--orange); }
  .page-header p { margin-top: 6px; color: var(--text-dim); font-size: 14px; }

  /* ===== CARDS ===== */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--orange); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content:''; display:inline-block; width:3px; height:14px; background: var(--orange); border-radius:2px; }

  /* ===== STATS BAR ===== */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }

  .stat-card {
    background: #FFFFFF;
    border: 1px solid rgba(232,80,10,0.12);
    border-radius: var(--radius);
    padding: 20px;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .stat-card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--orange), transparent);
  }
  .stat-value { font-size: 32px; font-weight: 900; color: var(--text); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.5px; }

  /* ===== TABLE ===== */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: #F8F0EC; }
  th {
    padding: 12px 16px; text-align: left;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 13px 16px;
    border-bottom: 1px solid #EEF0F5;
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FDF5F1; }

  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 6px;
    font-size: 12px; font-weight: 700;
  }
  .rank-1 { background: rgba(255,215,0,0.15); color: #FFD700; }
  .rank-2 { background: rgba(192,192,192,0.15); color: #C0C0C0; }
  .rank-3 { background: rgba(205,127,50,0.15); color: #CD7F32; }
  .rank-n { background: rgba(255,107,43,0.08); color: var(--text-muted); }

  .pts-pill {
    display: inline-block;
    background: linear-gradient(135deg, rgba(255,107,43,0.15), rgba(255,107,43,0.05));
    border: 1px solid rgba(255,107,43,0.3);
    color: var(--orange-light); padding: 3px 10px; border-radius: 20px;
    font-weight: 700; font-size: 13px;
  }

  /* ===== FORMS ===== */
  .form-grid { display: grid; gap: 16px; }
  .form-grid-2 { grid-template-columns: 1fr 1fr; }
  .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  @media(max-width:640px) { .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; } }

  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; }

  input[type=text], input[type=number], input[type=password], select, textarea {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid #D8DCE8;
    border-radius: var(--radius);
    color: var(--text); font-family: var(--font); font-size: 14px;
    padding: 10px 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px var(--orange-glow);
  }
  select option { background: #FFFFFF; color: var(--text); }
  textarea { resize: vertical; min-height: 80px; }

  .form-row { display: flex; flex-direction: column; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: var(--radius);
    font-family: var(--font); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    color: white; box-shadow: 0 4px 16px rgba(255,107,43,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,43,0.4); }
  .btn-secondary {
    background: #FFFFFF; color: var(--text);
    border: 1px solid #D0D4DF;
  }
  .btn-secondary:hover { background: #F0F2F6; }
  .btn-blue {
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    color: white; box-shadow: 0 4px 16px rgba(26,143,227,0.3);
  }
  .btn-blue:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,143,227,0.4); }
  .btn-danger {
    background: rgba(220,50,50,0.1); color: #FF6B6B;
    border: 1px solid rgba(220,50,50,0.2);
  }
  .btn-danger:hover { background: rgba(220,50,50,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 6px 10px; }

  .actions-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }

  /* ===== TAGS ===== */
  .tag {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  }
  .tag-graid { background: rgba(255,107,43,0.15); color: var(--orange-light); }
  .tag-weekly { background: rgba(26,143,227,0.15); color: var(--blue-light); }
  .tag-xp { background: rgba(80,200,80,0.15); color: #7EE87E; }
  .tag-pending { background: rgba(255,200,0,0.15); color: #FFCC00; }
  .tag-approved { background: rgba(80,200,80,0.15); color: #7EE87E; }
  .tag-rejected { background: rgba(220,50,50,0.15); color: #FF6B6B; }

  /* ===== ALERT / TOAST ===== */
  #toast {
    position: fixed; bottom: 32px; right: 32px; z-index: 9999;
    background: #FFFFFF; border: 1px solid #D8DCE8;
    border-radius: var(--radius); padding: 14px 20px;
    font-size: 14px; min-width: 200px; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    transform: translateY(20px); opacity:0;
    transition: all 0.3s; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(20,160,80,0.4); color: #0E8A3A; background: #F0FBF4; }
  #toast.error { border-color: rgba(220,50,50,0.3); color: #C0281E; background: #FFF2F0; }
  #toast.info { border-color: var(--border-blue); color: var(--blue-dark); background: #F0F7FF; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset:0; z-index: 500;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #FFFFFF; border: 1px solid #D8DCE8;
    border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 480px;
    animation: modalIn 0.25s ease;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  }
  @keyframes modalIn { from { transform: scale(0.95); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .modal p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .modal .form-grid { gap: 14px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ===== REWARD LIST ===== */
  .reward-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .reward-card {
    background: #FFFFFF; border: 1px solid #E0E3EC;
    border-radius: var(--radius); padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .reward-card:hover { border-color: var(--orange); box-shadow: 0 4px 16px rgba(232,80,10,0.1); }
  .reward-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .reward-cost {
    font-size: 22px; font-weight: 900; color: var(--orange);
    line-height: 1;
  }
  .reward-cost span { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .reward-desc { font-size: 13px; color: var(--text-dim); flex: 1; }
  .reward-stock { font-size: 12px; color: var(--text-muted); }

  /* ===== DIVIDER ===== */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* ===== ADMIN MEMBER ROW ===== */
  .member-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid #EEF0F5;
  }
  .member-row:last-child { border-bottom: none; }
  .member-name { flex: 1; font-size: 14px; font-weight: 600; }
  .member-pts { font-size: 14px; color: var(--orange); font-weight: 700; min-width: 60px; text-align: right; }

  /* ===== INLINE EDIT ===== */
  .inline-edit { display: flex; align-items: center; gap: 6px; }
  .inline-edit input { width: 90px; padding: 5px 8px; font-size: 13px; }

  /* ===== PLAYER NAME TAG ===== */
  .player-input-row { display: flex; gap: 8px; align-items: center; }
  .player-input-row input { flex: 1; }

  /* ===== SECTION HEADING ===== */
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
  }

  /* ===== HERO (home) ===== */
  .hero {
    text-align: center; padding: 60px 20px 40px;
  }
  .hero-icon {
    width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 900; color: white;
    box-shadow: 0 0 40px rgba(255,107,43,0.35);
  }
  .hero h2 { font-size: 40px; font-weight: 900; color: var(--text); letter-spacing: -1px; }
  .hero h2 em { font-style: normal; color: var(--orange); }
  .hero p { color: var(--text-dim); margin-top: 12px; font-size: 16px; }
  .hero-btns { display: flex; gap: 12px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }

  /* ===== PENDING ITEM ===== */
  .pending-item {
    background: #FAFBFC; border: 1px solid #E4E7F0;
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .pending-info { flex: 1; }
  .pending-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .pending-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .pending-actions { display: flex; gap: 8px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #F0F2F6; }
  ::-webkit-scrollbar-thumb { background: rgba(232,80,10,0.25); border-radius: 3px; }

  /* ===== SEARCHABLE SELECT ===== */
  .search-select-wrap { position: relative; }
  .search-select-input {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid #D8DCE8;
    border-radius: var(--radius);
    color: var(--text); font-family: var(--font); font-size: 14px;
    padding: 10px 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: text;
  }
  .search-select-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px var(--orange-glow);
  }
  .search-select-dropdown {
    display: none;
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 200;
    background: #FFFFFF; border: 1px solid #D8DCE8;
    border-radius: var(--radius); overflow-y: auto; max-height: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .search-select-dropdown.open { display: block; }
  .search-select-option {
    padding: 9px 14px; font-size: 14px; cursor: pointer; color: var(--text);
    transition: background 0.12s;
  }
  .search-select-option:hover, .search-select-option.active { background: #FDF5F1; color: var(--orange); }
  .search-select-option.no-result { color: var(--text-muted); cursor: default; font-size: 13px; }
  .search-select-option.no-result:hover { background: none; }

  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-muted);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  /* ===== IMAGE UPLOAD ZONE ===== */
  .img-zone {
    border: 2px dashed #D0D4DF;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    min-height: 100px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .img-zone:hover, .img-zone.drag-over {
    border-color: var(--orange);
    background: #FFF8F5;
  }
  .img-zone.has-image { border-style: solid; border-color: var(--orange); padding: 8px; }
  .img-zone input[type=file] { display: none; }
  .img-zone-label { font-size: 13px; color: var(--text-muted); }
  .img-zone-hint { font-size: 11px; color: var(--text-muted); opacity: 0.7; }
  .img-zone img { max-width: 100%; max-height: 240px; border-radius: 6px; display: block; }
  .img-zone-clear {
    position: absolute; top: 6px; right: 8px;
    background: rgba(220,50,50,0.1); color: #C0281E;
    border: none; border-radius: 4px; padding: 2px 8px;
    font-size: 11px; cursor: pointer; font-family: var(--font);
  }
  .img-zone-clear:hover { background: rgba(220,50,50,0.2); }


</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#" onclick="navTo('home')">
    <div class="logo-icon">悪</div>
    <div class="logo-text">
      <div class="logo-title">Akuma Paradise</div>
      <div class="logo-sub">Guild Management</div>
    </div>
  </a>
  <nav>
    <button onclick="navTo('home')" data-page="home">首頁</button>
    <button onclick="navTo('leaderboard')" data-page="leaderboard">積分總表</button>
    <button onclick="navTo('report')" data-page="report">申報任務</button>
    <button onclick="navTo('rewards')" data-page="rewards">獎勵兌換</button>
    <button onclick="navTo('admin')" data-page="admin" id="admin-nav-btn" style="display:none">管理後台</button>
  </nav>
  <button id="admin-toggle-btn" onclick="toggleAdminLogin()">管理員登入</button>
</header>

<main>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="hero">
      <div class="hero-icon">悪</div>
      <h2>Akuma <em>Paradise</em></h2>
      <p>Wynncraft 公會積分管理系統 — 追蹤貢獻、兌換獎勵</p>
      <div class="hero-btns">
        <button class="btn btn-primary" onclick="navTo('leaderboard')">📊 查看積分排行</button>
        <button class="btn btn-secondary" onclick="navTo('report')">📝 申報完成任務</button>
        <button class="btn btn-blue" onclick="navTo('rewards')">🎁 瀏覽獎勵清單</button>
      </div>
    </div>

    <div class="stats-grid" id="home-stats"></div>

    <div class="card">
      <div class="card-title">積分計算規則</div>
      <div class="form-grid form-grid-3">
        <div style="background:#FFF8F5;border:1px solid rgba(232,80,10,0.18);border-radius:var(--radius);padding:18px;">
          <div style="color:var(--orange);font-weight:700;font-size:14px;margin-bottom:8px;">⚔️ Graid</div>
          <div style="font-size:22px;font-weight:900;color:var(--text);">+2 <span style="font-size:13px;color:var(--text-muted)">pts / 人次</span></div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">每次 Graid 共 4 名玩家各得 2 分</div>
        </div>
        <div style="background:#F5F9FF;border:1px solid rgba(20,120,204,0.18);border-radius:var(--radius);padding:18px;">
          <div style="color:var(--blue);font-weight:700;font-size:14px;margin-bottom:8px;">🎯 Weekly Obj</div>
          <div style="font-size:22px;font-weight:900;color:var(--text);">+5 <span style="font-size:13px;color:var(--text-muted)">pts 基本</span></div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">月內 2 次 +7 額外；4 次 +15 額外</div>
        </div>

<script>
// ============================================================
//  DATA LAYER (localStorage)
// ============================================================
const ADMIN_PW = 'akuma2025'; // 預設密碼，可改
let isAdmin = false;
let currentPage = 'home';

function load(k, def) {
  try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; }
}
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

function getMembers() { return load('members', []); }
function saveMembers(m) { save('members', m); }
function getRewards() { return load('rewards', defaultRewards()); }
function saveRewards(r) { save('rewards', r); }
function getPending() { return load('pending', []); }
function savePending(p) { save('pending', p); }
function getRedeems() { return load('redeems', []); }
function saveRedeems(r) { save('redeems', r); }
function getWeeklyTrack() { return load('weeklyTrack', {}); }
function saveWeeklyTrack(w) { save('weeklyTrack', w); }

function defaultRewards() {
  return [
    { id: 1, name: '特殊稱號', cost: 20, desc: '獲得公會專屬稱號', stock: -1 },
    { id: 2, name: '裝備強化券', cost: 15, desc: '協助強化一件裝備', stock: 5 },
    { id: 3, name: '傳說材料包', cost: 30, desc: '包含稀有合成材料 x5', stock: 3 },
  ];
}

function nextId(arr) { return arr.length ? Math.max(...arr.map(x=>x.id||0)) + 1 : 1; }

// ============================================================
//  NAV
// ============================================================
function navTo(page) {
  if (page === 'admin' && !isAdmin) { toggleAdminLogin(); return; }
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  renderPage(page);
}

function renderPage(page) {
  if (page === 'home') renderHome();
  else if (page === 'leaderboard') renderLeaderboard();
  else if (page === 'report') renderReport();
  else if (page === 'rewards') renderRewards();
  else if (page === 'admin') renderAdmin();
}

// ============================================================
//  TOAST
// ============================================================
let toastTimer;
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// ============================================================
//  MODAL
// ============================================================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ============================================================
//  ADMIN AUTH
// ============================================================
function toggleAdminLogin() {
  if (isAdmin) { doAdminLogout(); return; }
  openModal('login-modal');
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}
function doAdminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    closeModal('login-modal');
    document.getElementById('admin-pw').value = '';
    document.getElementById('admin-toggle-btn').textContent = '登出管理員';
    document.getElementById('admin-toggle-btn').classList.add('logged-in');
    document.getElementById('admin-nav-btn').style.display = '';
    toast('歡迎，管理員！', 'success');
    navTo('admin');
  } else {
    toast('密碼錯誤', 'error');
    document.getElementById('admin-pw').value = '';
  }
}
function doAdminLogout() {
  isAdmin = false;
  document.getElementById('admin-toggle-btn').textContent = '管理員登入';
  document.getElementById('admin-toggle-btn').classList.remove('logged-in');
  document.getElementById('admin-nav-btn').style.display = 'none';
  toast('已登出', 'info');
  navTo('home');
}

// ============================================================
//  POINTS CALC
// ============================================================
function totalPts(m) {
  return (m.ptsGraid||0) + (m.ptsWeekly||0) + (m.ptsXP||0) + (m.ptsBonus||0);
}

// Weekly scoring
function calcWeeklyAdd(currentCount) {
  // currentCount = completions THIS month BEFORE this one
  const newCount = currentCount + 1;
  let pts = 5;
  if (newCount === 2) pts += 7;
  if (newCount === 4) pts += 15;
  return pts;
}

// ============================================================
//  HOME
// ============================================================
function renderHome() {
  const members = getMembers();
  const pending = getPending();
  const el = document.getElementById('home-stats');
  el.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${members.length}</div>
      <div class="stat-label">公會成員數</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${members.reduce((s,m)=>s+totalPts(m),0)}</div>
      <div class="stat-label">全公會總積分</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${pending.filter(p=>p.status==='pending').length}</div>
      <div class="stat-label">待審核申報</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${members.length ? Math.max(...members.map(m=>totalPts(m))) : 0}</div>
      <div class="stat-label">最高個人積分</div>
    </div>
  `;
}

// ============================================================
//  LEADERBOARD
// ============================================================
function renderLeaderboard() {
  const members = [...getMembers()].sort((a,b) => totalPts(b)-totalPts(a));
  const tbody = document.getElementById('leaderboard-body');
  if (!members.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">📊</div>尚無成員資料</div></td></tr>`;
    return;
  }
  tbody.innerHTML = members.map((m, i) => {
    const r = i+1;
    const cls = r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-n';
    return `<tr>
      <td><span class="rank-badge ${cls}">${r}</span></td>
      <td style="font-weight:600">${esc(m.name)}</td>
      <td>${m.ptsGraid||0}</td>
      <td>${m.ptsWeekly||0}</td>
      <td>${m.ptsXP||0}</td>
      <td><span class="pts-pill">${totalPts(m)}</span></td>
    </tr>`;
  }).join('');
}

// ============================================================
//  SEARCHABLE SELECT ENGINE
// ============================================================
// Usage: initSearchSelect(fieldId, members, labelFn, onChange)
// fieldId e.g. 'graid-p1' → looks for #graid-p1-input, #graid-p1 (hidden), #graid-p1-drop
function initSearchSelect(fieldId, items, labelFn, onChange) {
  const input = document.getElementById(fieldId + '-input');
  const hidden = document.getElementById(fieldId);
  const drop   = document.getElementById(fieldId + '-drop');
  if (!input || !hidden || !drop) return;

  // clear previous state
  hidden.value = '';
  input.value = '';

  function render(q) {
    const filtered = q
      ? items.filter(it => labelFn(it).toLowerCase().includes(q.toLowerCase()))
      : items;
    if (!filtered.length) {
      drop.innerHTML = '<div class="search-select-option no-result">找不到玩家</div>';
    } else {
      drop.innerHTML = filtered.map(it =>
        `<div class="search-select-option" data-id="${it.id}" data-label="${esc(labelFn(it))}">${esc(labelFn(it))}</div>`
      ).join('');
    }
    drop.querySelectorAll('.search-select-option:not(.no-result)').forEach(opt => {
      opt.addEventListener('mousedown', e => {
        e.preventDefault();
        hidden.value = opt.dataset.id;
        input.value  = opt.dataset.label;
        drop.classList.remove('open');
        if (onChange) onChange();
      });
    });
  }

  input.addEventListener('focus', () => { render(input.value); drop.classList.add('open'); });
  input.addEventListener('input', () => { hidden.value = ''; render(input.value); drop.classList.add('open'); if (onChange) onChange(); });
  input.addEventListener('blur',  () => { setTimeout(() => drop.classList.remove('open'), 150); });

  // clicking the wrap re-opens
  input.addEventListener('click', () => { render(input.value); drop.classList.add('open'); });
}

function clearSearchSelect(fieldId) {
  const input  = document.getElementById(fieldId + '-input');
  const hidden = document.getElementById(fieldId);
  const drop   = document.getElementById(fieldId + '-drop');
  if (input)  input.value  = '';
  if (hidden) hidden.value = '';
  if (drop)   drop.classList.remove('open');
}

// ============================================================
//  IMAGE UPLOAD / PASTE SUPPORT
// ============================================================
const imgData = {}; // { 'graid': base64, 'weekly': base64 }

function setImgZone(key, dataUrl) {
  imgData[key] = dataUrl;
  const zone = document.getElementById(key + '-img-zone');
  zone.classList.add('has-image');
  zone.innerHTML = `
    <img src="${dataUrl}" />
    <button class="img-zone-clear" onclick="clearImgZone(event,'${key}')">✕ 移除</button>
  `;
}
function clearImgZone(e, key) {
  if (e) e.stopPropagation();
  imgData[key] = null;
  const zone = document.getElementById(key + '-img-zone');
  zone.classList.remove('has-image');
  zone.innerHTML = `
    <input type="file" id="${key}-img-file" accept="image/*" onchange="handleFileSelect(event,'${key}')" />
    <div class="img-zone-label" id="${key}-img-label">📷 點擊選擇或拖曳圖片到此處</div>
    <div class="img-zone-hint">也可以直接在此頁面按 Ctrl+V 貼上截圖</div>
  `;
  // re-wire file input
  document.getElementById(key+'-img-file').onchange = e => handleFileSelect(e, key);
}
function handleFileSelect(e, key) {
  const file = e.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const r = new FileReader();
  r.onload = ev => setImgZone(key, ev.target.result);
  r.readAsDataURL(file);
}
function handleDragOver(e, key) { e.preventDefault(); document.getElementById(key+'-img-zone').classList.add('drag-over'); }
function handleDragLeave(key) { document.getElementById(key+'-img-zone').classList.remove('drag-over'); }
function handleDrop(e, key) {
  e.preventDefault();
  document.getElementById(key+'-img-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) { toast('請上傳圖片檔案', 'error'); return; }
  const r = new FileReader();
  r.onload = ev => setImgZone(key, ev.target.result);
  r.readAsDataURL(file);
}

// Global Ctrl+V paste listener — pastes into whichever form is visible
document.addEventListener('paste', e => {
  if (!document.getElementById('page-report').classList.contains('active')) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      const r = new FileReader();
      // figure out which zone to target: whichever graid/weekly card is visible first
      const activeKey = 'graid'; // default to graid; user can switch by clicking the other zone first
      r.onload = ev => setImgZone(activeKey, ev.target.result);
      r.readAsDataURL(file);
      toast('截圖已貼至 Graid 附圖區', 'success');
      break;
    }
  }
});

function renderReport() {
  const members = getMembers();
  ['graid-p1','graid-p2','graid-p3','graid-p4'].forEach(id => {
    initSearchSelect(id, members, m => m.name, checkDupGraid);
  });
  initSearchSelect('weekly-player', members, m => m.name, null);
  // reset image zones
  ['graid','weekly'].forEach(k => { if (imgData[k]) clearImgZone(null, k); });
  renderPendingPublic();
}

function checkDupGraid() {
  const vals = ['graid-p1','graid-p2','graid-p3','graid-p4'].map(id=>document.getElementById(id).value).filter(v=>v);
  const dup = vals.length !== new Set(vals).size;
  document.getElementById('graid-dup-warn').style.display = dup ? '' : 'none';
}

function submitGraid() {
  const pids = ['graid-p1','graid-p2','graid-p3','graid-p4'].map(id=>document.getElementById(id).value);
  if (pids.some(v=>!v)) { toast('請選擇全部四名玩家', 'error'); return; }
  if (new Set(pids).size !== 4) { toast('有重複玩家', 'error'); return; }
  const members = getMembers();
  const names = pids.map(pid => { const m = members.find(m=>String(m.id)===String(pid)); return m ? m.name : '?'; });
  const pending = getPending();
  pending.push({
    id: nextId(pending), type: 'graid',
    players: pids, playerNames: names,
    image: imgData['graid'] || null,
    status: 'pending', ts: Date.now()
  });
  savePending(pending);
  toast('Graid 申報已提交，等待管理員審核', 'success');
  ['graid-p1','graid-p2','graid-p3','graid-p4'].forEach(id => clearSearchSelect(id));
  clearImgZone(null, 'graid');
  renderPendingPublic();
}

function submitWeekly() {
  const pid = document.getElementById('weekly-player').value;
  if (!pid) { toast('請選擇玩家', 'error'); return; }
  const now = new Date();
  const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const members = getMembers();
  const m = members.find(m=>String(m.id)===String(pid));
  const pending = getPending();
  pending.push({
    id: nextId(pending), type: 'weekly',
    players: [pid], playerNames: [m ? m.name : '?'],
    month,
    image: imgData['weekly'] || null,
    status: 'pending', ts: Date.now()
  });
  savePending(pending);
  toast('Weekly Obj 申報已提交，等待管理員審核', 'success');
  clearSearchSelect('weekly-player');
  clearImgZone(null, 'weekly');
  renderPendingPublic();
}

function renderPendingPublic() {
  const pending = getPending().filter(p=>p.status==='pending');
  const el = document.getElementById('pending-public-list');
  if (!pending.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div>目前沒有待審核的申報</div>';
    return;
  }
  el.innerHTML = pending.map(p => `
    <div class="pending-item">
      <div class="pending-info">

function renderRewards() {
  const rewards = getRewards();
  const members = getMembers();
  const redeems = getRedeems();

  // reward grid
  const rg = document.getElementById('reward-grid');
  if (!rewards.length) {
    rg.innerHTML = '<div class="empty-state"><div class="icon">🎁</div>目前沒有可兌換的獎勵</div>';
  } else {
    rg.innerHTML = rewards.map(r => `
      <div class="reward-card">
        <div class="reward-name">${esc(r.name)}</div>
        <div class="reward-cost">${r.cost} <span>pts</span></div>
        <div class="reward-desc">${esc(r.desc||'')}</div>
        <div class="reward-stock">${r.stock<0?'庫存：無限':r.stock===0?'<span style="color:#C0281E">已售罄</span>':'庫存：'+r.stock+' 個'}</div>
      </div>
    `).join('');
  }

  // player searchable select
  initSearchSelect('redeem-player', members, m => `${m.name} (${totalPts(m)} pts)`, null);

  const rr = document.getElementById('redeem-reward');
  rr.innerHTML = '<option value="">— 選擇獎勵 —</option>' +
    rewards.filter(r=>r.stock!==0).map(r=>`<option value="${r.id}">${esc(r.name)} — ${r.cost} pts</option>`).join('');

  rr.onchange = () => {
    const rid = rr.value;
    const rw = rewards.find(r=>String(r.id)===String(rid));
    document.getElementById('redeem-cost-preview').textContent = rw ? `本次兌換需消耗 ${rw.cost} 積分` : '';
  };

  // redeem history
  const rl = document.getElementById('redeem-list');
  if (!redeems.length) {
    rl.innerHTML = '<div class="empty-state"><div class="icon">📦</div>尚無兌換紀錄</div>';
  } else {
    const sorted = [...redeems].sort((a,b)=>b.ts-a.ts);
    rl.innerHTML = sorted.map(r => `
      <div class="pending-item">
        <div class="pending-info">
          <div class="pending-name">${esc(r.playerName)} → ${esc(r.rewardName)}</div>
          <div class="pending-meta">${fmtDate(r.ts)} · 消耗 ${r.cost} pts</div>
        </div>
        <span class="tag ${r.status==='approved'?'tag-approved':r.status==='rejected'?'tag-rejected':'tag-pending'}">
          ${r.status==='approved'?'已核准':r.status==='rejected'?'已拒絕':'待審核'}
        </span>
      </div>
    `).join('');
  }
}

function submitRedeem() {
  const pid = document.getElementById('redeem-player').value;
  const rid = document.getElementById('redeem-reward').value;
  const note = document.getElementById('redeem-note').value.trim();
  if (!pid) { toast('請選擇玩家', 'error'); return; }
  if (!rid) { toast('請選擇獎勵', 'error'); return; }
  const members = getMembers();
  const rewards = getRewards();
  const m = members.find(m=>String(m.id)===String(pid));
  const r = rewards.find(r=>String(r.id)===String(rid));
  if (!m || !r) { toast('資料錯誤', 'error'); return; }
  if (totalPts(m) < r.cost) { toast(`積分不足！你有 ${totalPts(m)} pts，需要 ${r.cost} pts`, 'error'); return; }
  const redeems = getRedeems();
  redeems.push({
    id: nextId(redeems),
    playerId: m.id, playerName: m.name,
    rewardId: r.id, rewardName: r.name,
    cost: r.cost, note,
    status: 'pending', ts: Date.now()
  });
  saveRedeems(redeems);
  toast('兌換申請已提交！', 'success');
  document.getElementById('redeem-note').value = '';
  clearSearchSelect('redeem-player');
  document.getElementById('redeem-reward').value = '';
  document.getElementById('redeem-cost-preview').textContent = '';
  renderRewards();
}

function adminTab(tab) {
  document.querySelectorAll('.admin-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('admin-'+tab).style.display = '';
  if (tab==='members') renderAdminMembers();
  else if (tab==='pending') renderAdminPending();
  else if (tab==='xp') renderXPImport();
  else if (tab==='rewardmgr') renderAdminRewards();
  else if (tab==='redeem-mgr') renderAdminRedeems();
}

  adminTab('members');
}

/* -- MEMBERS -- */
function renderAdminMembers() {
  const members = getMembers();
  const el = document.getElementById('admin-member-list');
  if (!members.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">👥</div>尚無成員</div>'; return;
  }
  el.innerHTML = members.map(m => `
    <div class="member-row">
      <div class="member-name">${esc(m.name)}</div>
      <div style="font-size:12px;color:var(--text-muted);">
        Graid:${m.ptsGraid||0} | Weekly:${m.ptsWeekly||0} | XP:${m.ptsXP||0} | 手動:${m.ptsBonus||0}
      </div>
      <div class="member-pts">${totalPts(m)} pts</div>
      <button class="btn btn-secondary btn-sm" onclick="openEditMember(${m.id})">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="removeMember(${m.id})">移除</button>
    </div>
  `).join('');

function addMember() {
  const name = document.getElementById('new-member-name').value.trim();
  const pts = parseInt(document.getElementById('new-member-pts').value) || 0;
  if (!name) { toast('請輸入玩家名稱', 'error'); return; }
  const members = getMembers();
  if (members.find(m=>m.name.toLowerCase()===name.toLowerCase())) { toast('此玩家已存在', 'error'); return; }
  members.push({ id: nextId(members), name, ptsGraid:0, ptsWeekly:0, ptsXP:0, ptsBonus:pts });
  saveMembers(members);
  document.getElementById('new-member-name').value = '';
  document.getElementById('new-member-pts').value = '';
  toast(`已新增 ${name}`, 'success');
  renderAdminMembers();
}

function removeMember(id) {
  if (!confirm('確定要移除此成員？')) return;
  const members = getMembers().filter(m=>m.id!==id);
  saveMembers(members);
  toast('成員已移除', 'info');
  renderAdminMembers();
}

function openEditMember(id) {
  const m = getMembers().find(m=>m.id===id);
  if (!m) return;
  document.getElementById('edit-member-id').value = id;
  document.getElementById('edit-member-name').value = m.name;
  document.getElementById('edit-pts-graid').value = m.ptsGraid||0;
  document.getElementById('edit-pts-weekly').value = m.ptsWeekly||0;
  document.getElementById('edit-pts-xp').value = m.ptsXP||0;
  document.getElementById('edit-pts-bonus').value = m.ptsBonus||0;
  openModal('edit-member-modal');
}

function saveEditMember() {
  const id = parseInt(document.getElementById('edit-member-id').value);
  const name = document.getElementById('edit-member-name').value.trim();
  if (!name) { toast('名稱不可空白', 'error'); return; }
  const members = getMembers();
  const idx = members.findIndex(m=>m.id===id);
  if (idx<0) return;
  members[idx].name = name;
  members[idx].ptsGraid = parseInt(document.getElementById('edit-pts-graid').value)||0;
  members[idx].ptsWeekly = parseInt(document.getElementById('edit-pts-weekly').value)||0;
  members[idx].ptsXP = parseInt(document.getElementById('edit-pts-xp').value)||0;
  members[idx].ptsBonus = parseInt(document.getElementById('edit-pts-bonus').value)||0;
  saveMembers(members);
  closeModal('edit-member-modal');
  toast('成員資料已更新', 'success');
  renderAdminMembers();
}

/* -- PENDING -- */
function renderAdminPending() {
  const pending = getPending();
  const el = document.getElementById('admin-pending-list');
  const items = pending.filter(p=>p.status==='pending');
  if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="icon">✅</div>沒有待審核的申報</div>'; return; }
  el.innerHTML = items.map(p => `
    <div class="pending-item" style="flex-direction:column;align-items:stretch;gap:10px;">
      <div style="display:flex;align-items:flex-start;gap:14px;">
        <div class="pending-info">
          <div class="pending-name">
            <span class="tag ${p.type==='graid'?'tag-graid':'tag-weekly'}">${p.type==='graid'?'Graid':'Weekly Obj'}</span>
            <strong>${p.playerNames.join('、')}</strong>
            <span style="color:var(--text-muted);font-size:12px;margin-left:8px;">${p.month||''}</span>
          </div>
          <div class="pending-meta">${fmtDate(p.ts)}</div>
        </div>
        <div class="pending-actions" style="margin-left:auto;flex-shrink:0;">
          <button class="btn btn-primary btn-sm" onclick="approvePending(${p.id})">✓ 核准</button>
          <button class="btn btn-danger btn-sm" onclick="rejectPending(${p.id})">✗ 拒絕</button>
        </div>
      </div>
      ${p.image ? `<img src="${p.image}" style="max-width:100%;max-height:260px;border-radius:6px;border:1px solid #E0E3EC;cursor:pointer;" onclick="window.open(this.src)" title="點擊放大" />` : '<div style="font-size:12px;color:var(--text-muted);">（未附截圖）</div>'}
    </div>
  `).join('');
}

function approvePending(id) {
  const pending = getPending();
  const p = pending.find(x=>x.id===id);
  if (!p) return;
  p.status = 'approved';
  const members = getMembers();

  if (p.type === 'graid') {
    p.players.forEach(pid => {
      const m = members.find(m=>String(m.id)===String(pid));
      if (m) m.ptsGraid = (m.ptsGraid||0) + 2;
    });
  } else if (p.type === 'weekly') {
    const pid = p.players[0];
    const m = members.find(m=>String(m.id)===String(pid));
    if (m) {
      const wt = getWeeklyTrack();
      const key = `${pid}_${p.month}`;
      wt[key] = (wt[key]||0);
      const pts = calcWeeklyAdd(wt[key]);
      wt[key]++;
      saveWeeklyTrack(wt);
      m.ptsWeekly = (m.ptsWeekly||0) + pts;
    }
  }

  saveMembers(members);
  savePending(pending);
  toast('已核准，積分已計入', 'success');
  renderAdminPending();
}

function rejectPending(id) {
  const pending = getPending();
  const p = pending.find(x=>x.id===id);
  if (!p) return;
  p.status = 'rejected';
  savePending(pending);
  toast('已拒絕此申報', 'info');
  renderAdminPending();
}

/* -- XP IMPORT (file-based with diff) -- */
function getXPSnapshot() { return load('xpSnapshot', {}); }
function saveXPSnapshot(s) { save('xpSnapshot', s); }

let xpPendingData = null; // holds parsed rows before confirm

function renderXPImport() {
  const now = new Date();
  document.getElementById('xp-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('xp-preview').style.display = 'none';
  xpPendingData = null;
  renderXPLastRecord();
}

function renderXPLastRecord() {
  const snap = getXPSnapshot();
  const el = document.getElementById('xp-last-record');
  const keys = Object.keys(snap);
  if (!keys.length) { el.innerHTML = '<div class="empty-state" style="padding:20px;"><div class="icon">📂</div>尚未有匯入紀錄</div>'; return; }
  el.innerHTML = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">上次匯入的 XP 快照（共 ${keys.length} 筆），將作為下次差額計算的基準：</div>` +
    `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">` +
    keys.map(name => `<div style="background:#F8F9FB;border:1px solid #E4E7F0;border-radius:8px;padding:10px 14px;font-size:13px;"><strong>${esc(name)}</strong><div style="color:var(--text-muted);margin-top:2px;">${Number(snap[name]).toLocaleString()} XP</div></div>`).join('') +
    `</div>`;
}

function handleXPFile(file) {
  if (!file) return;
  const name = file.name.toLowerCase();
  if (name.endsWith('.csv')) {
    const r = new FileReader();
    r.onload = e => parseXPCSV(e.target.result);
    r.readAsText(file, 'UTF-8');
  } else if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    const r = new FileReader();
    r.onload = e => parseXPExcel(e.target.result);
    r.readAsArrayBuffer(file);
  } else {
    toast('請上傳 .csv 或 .xlsx 檔案', 'error');
  }
}

function parseXPCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  const rows = [];
  for (const line of lines) {
    const parts = line.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
    if (parts.length < 2) continue;
    const xp = parseFloat(parts[1].replace(/,/g, ''));
    if (parts[0] && !isNaN(xp)) rows.push({ name: parts[0], xp });
  }
  // skip header row if first xp is NaN or 0 and name looks like a label
  showXPPreview(rows);
}

function parseXPExcel(buffer) {
  // Simple XLSX parser — reads first sheet, expects col A = name, col B = xp
  // We use a minimal built-in approach via reading zip-like structure
  // Since we can't load SheetJS in a plain HTML file without CDN, we use a CDN import
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload = () => {
    const wb = XLSX.read(buffer, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const rows = [];
    for (const row of raw) {
      const nameRaw = String(row[0]||'').trim();
      const xpRaw   = parseFloat(String(row[1]||'').replace(/,/g,''));
      if (nameRaw && !isNaN(xpRaw) && xpRaw >= 0) rows.push({ name: nameRaw, xp: xpRaw });
    }
    showXPPreview(rows);
  };
  script.onerror = () => toast('無法載入 Excel 解析器，請改用 CSV', 'error');
  if (!window.XLSX) document.head.appendChild(script);
  else {
    const wb = XLSX.read(buffer, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const rows = [];
    for (const row of raw) {
      const nameRaw = String(row[0]||'').trim();
      const xpRaw   = parseFloat(String(row[1]||'').replace(/,/g,''));
      if (nameRaw && !isNaN(xpRaw) && xpRaw >= 0) rows.push({ name: nameRaw, xp: xpRaw });
    }
    showXPPreview(rows);
  }
}

function showXPPreview(rows) {
  if (!rows.length) { toast('找不到有效資料，請確認格式（名稱, XP）', 'error'); return; }
  const snap = getXPSnapshot();
  const members = getMembers();

  // match rows to members (case-insensitive)
  const results = rows.map(row => {
    const member = members.find(m => m.name.toLowerCase() === row.name.toLowerCase());
    const prevXP = snap[row.name] ?? snap[Object.keys(snap).find(k=>k.toLowerCase()===row.name.toLowerCase())] ?? null;
    const diff   = prevXP !== null ? Math.max(0, row.xp - prevXP) : row.xp;
    const pts    = Math.floor(diff / 20000000);
    return { name: row.name, currentXP: row.xp, prevXP, diff, pts, matched: !!member, memberId: member?.id };
  });

  xpPendingData = results;

  const tbl = document.getElementById('xp-preview-table');
  tbl.innerHTML = `
    <div style="overflow-x:auto;border-radius:var(--radius);border:1px solid #E0E3EC;">
    <table>
      <thead><tr>
        <th>玩家名稱</th><th>本次 XP</th><th>上次快照</th><th>新增 XP</th><th>獲得積分</th><th>狀態</th>
      </tr></thead>
      <tbody>
        ${results.map(r => `<tr>
          <td style="font-weight:600;">${esc(r.name)}</td>
          <td>${r.currentXP.toLocaleString()}</td>
          <td>${r.prevXP !== null ? r.prevXP.toLocaleString() : '<span style="color:var(--text-muted)">無紀錄</span>'}</td>
          <td style="color:var(--orange);font-weight:600;">+${r.diff.toLocaleString()}</td>
          <td><span class="pts-pill">${r.pts > 0 ? '+'+r.pts : '0'}</span></td>
          <td>${r.matched ? '<span class="tag tag-approved">已對應</span>' : '<span class="tag tag-rejected">未找到成員</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    <div style="margin-top:12px;font-size:13px;color:var(--text-muted);">
      共 ${results.length} 筆 · 可獲得積分合計：${results.reduce((s,r)=>s+r.pts,0)} pts · 未對應到成員的列將被略過
    </div>
  `;
  document.getElementById('xp-preview').style.display = '';
  toast(`已解析 ${rows.length} 筆資料，請確認後套用`, 'info');
}

function applyXPImport() {
  const month = document.getElementById('xp-month').value.trim();
  if (!/^\d{4}-\d{2}$/.test(month)) { toast('請填入結算月份（YYYY-MM）', 'error'); return; }
  if (!xpPendingData) return;
  const members = getMembers();
  const snap = getXPSnapshot();
  let changed = 0;
  xpPendingData.forEach(r => {
    if (!r.matched || r.pts <= 0) { snap[r.name] = r.currentXP; return; }
    const m = members.find(m => m.id === r.memberId);
    if (m) { m.ptsXP = (m.ptsXP||0) + r.pts; changed++; }
    snap[r.name] = r.currentXP; // update snapshot
  });
  saveMembers(members);
  saveXPSnapshot(snap);
  xpPendingData = null;
  document.getElementById('xp-preview').style.display = 'none';
  document.getElementById('xp-file-input').value = '';
  toast(`✅ ${month} XP 結算完成，${changed} 名成員獲得積分`, 'success');
  renderXPLastRecord();
}

function cancelXPImport() {
  xpPendingData = null;
  document.getElementById('xp-preview').style.display = 'none';
  document.getElementById('xp-file-input').value = '';
}

/* -- REWARDS -- */
function renderAdminRewards() {
  const rewards = getRewards();
  const el = document.getElementById('admin-reward-list');
  if (!rewards.length) { el.innerHTML = '<div class="empty-state"><div class="icon">🎁</div>尚無獎勵</div>'; return; }
  el.innerHTML = rewards.map(r => `
    <div class="member-row">
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${esc(r.name)}</div>
        <div style="font-size:12px;color:var(--text-muted);">${esc(r.desc||'')} · ${r.cost} pts · ${r.stock<0?'無限庫存':r.stock+' 個'}</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="editReward(${r.id})">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="removeReward(${r.id})">刪除</button>
    </div>
  `).join('');
}

function addReward() {
  const name = document.getElementById('rw-name').value.trim();
  const cost = parseInt(document.getElementById('rw-cost').value)||0;
  const desc = document.getElementById('rw-desc').value.trim();
  const stock = parseInt(document.getElementById('rw-stock').value);
  if (!name) { toast('請輸入獎勵名稱', 'error'); return; }
  if (cost <= 0) { toast('積分需大於 0', 'error'); return; }
  const rewards = getRewards();
  rewards.push({ id: nextId(rewards), name, cost, desc, stock: isNaN(stock)?-1:stock });
  saveRewards(rewards);
  toast(`已新增獎勵：${name}`, 'success');
  ['rw-name','rw-cost','rw-desc','rw-stock'].forEach(id=>{ document.getElementById(id).value=''; });
  renderAdminRewards();
}

function removeReward(id) {
  if (!confirm('確定刪除此獎勵？')) return;
  saveRewards(getRewards().filter(r=>r.id!==id));
  toast('獎勵已刪除', 'info');
  renderAdminRewards();
}

function editReward(id) {
  const r = getRewards().find(r=>r.id===id);
  if (!r) return;
  const name = prompt('獎勵名稱', r.name);
  if (name===null) return;
  const cost = parseInt(prompt('所需積分', r.cost));
  const desc = prompt('說明', r.desc||'');
  const stock = parseInt(prompt('庫存（-1=無限）', r.stock));
  const rewards = getRewards();
  const idx = rewards.findIndex(x=>x.id===id);
  rewards[idx] = { ...rewards[idx], name: name||r.name, cost: isNaN(cost)?r.cost:cost, desc: desc??r.desc, stock: isNaN(stock)?r.stock:stock };
  saveRewards(rewards);
  toast('獎勵已更新', 'success');
  renderAdminRewards();
}

/* -- REDEEM MGR -- */
function renderAdminRedeems() {
  const redeems = getRedeems();
  const el = document.getElementById('admin-redeem-list');
  const items = redeems.filter(r=>r.status==='pending');
  if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📦</div>沒有待審核的兌換申請</div>'; return; }
  el.innerHTML = items.map(r => `
    <div class="pending-item">
      <div class="pending-info">
        <div class="pending-name">${esc(r.playerName)} → <strong>${esc(r.rewardName)}</strong> (${r.cost} pts)</div>
        <div class="pending-meta">${fmtDate(r.ts)}${r.note?' · '+esc(r.note):''}</div>
      </div>
      <div class="pending-actions">
        <button class="btn btn-primary btn-sm" onclick="approveRedeem(${r.id})">✓ 核准</button>
        <button class="btn btn-danger btn-sm" onclick="rejectRedeem(${r.id})">✗ 拒絕</button>
      </div>
    </div>
  `).join('');
}

function approveRedeem(id) {
  const redeems = getRedeems();
  const r = redeems.find(x=>x.id===id);
  if (!r) return;
  const members = getMembers();
  const m = members.find(m=>m.id===r.playerId);
  if (!m) { toast('找不到玩家', 'error'); return; }
  if (totalPts(m) < r.cost) { toast(`玩家積分不足（現有 ${totalPts(m)} pts）`, 'error'); return; }

  // deduct from bonus (most flexible)
  let deduct = r.cost;
  // deduct priority: bonus > xp > weekly > graid
  const fields = ['ptsBonus','ptsXP','ptsWeekly','ptsGraid'];
  for (const f of fields) {
    if (deduct <= 0) break;
    const take = Math.min(m[f]||0, deduct);
    m[f] = (m[f]||0) - take;
    deduct -= take;
  }

  // reduce stock
  const rewards = getRewards();
  const rw = rewards.find(x=>x.id===r.rewardId);
  if (rw && rw.stock > 0) rw.stock--;
  saveRewards(rewards);

  r.status = 'approved';
  saveMembers(members);
  saveRedeems(redeems);
  toast('已核准兌換，積分已扣除', 'success');
  renderAdminRedeems();
}

function rejectRedeem(id) {
  const redeems = getRedeems();
  const r = redeems.find(x=>x.id===id);
  if (!r) return;
  r.status = 'rejected';
  saveRedeems(redeems);
  toast('已拒絕此兌換申請', 'info');
  renderAdminRedeems();
}

// ============================================================
//  UTILS
// ============================================================
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ============================================================
//  INIT
// ============================================================
renderHome();
</script>
